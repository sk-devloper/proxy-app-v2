name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create release archive
        run: zip -r proxy-app-v2-${{ github.ref_name }}.zip . -x "*.git*" -x "__pycache__/*" -x "*.pyc" -x "logs/*" -x "certs/*" -x ".pytest_cache/*" -x "dist/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: proxy-app-v2-${{ github.ref_name }}.zip
          generate_release_notes: true
